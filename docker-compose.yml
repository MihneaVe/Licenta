version: "3.9"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      bash -c "
        cd /app/backend &&
        python manage.py migrate --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "

  worker:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      bash -c "
        cd /app/backend &&
        python manage.py run_pipeline
      "
    profiles:
      - pipeline

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
